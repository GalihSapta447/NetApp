{% extends "base.html" %}
{% block title %}Verifikasi OTP Registrasi{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4 text-center">
                <span class="badge text-bg-success mb-2">AKTIVASI AKUN</span>
                <h3>Verifikasi OTP Registrasi</h3>
                <p class="text-muted">
                    Masukkan kode enam digit yang dikirim ke <strong>{{ email }}</strong>.
                    Kode berlaku {{ ttl_minutes }} menit.
                </p>

                <form method="POST" class="mt-4">
                    <input type="text" name="otp" class="form-control form-control-lg text-center otp-input"
                           inputmode="numeric" autocomplete="one-time-code" pattern="[0-9]{6}"
                           maxlength="6" placeholder="000000" required autofocus>
                    <button type="submit" class="btn btn-success w-100 mt-3">Verifikasi Akun</button>
                </form>

                <form method="POST" action="{{ url_for('resend_registration_otp') }}" class="mt-3">
                    <button type="submit" class="btn btn-outline-primary w-100">Kirim Ulang OTP</button>
                </form>
                <form method="POST" action="{{ url_for('cancel_registration') }}" class="mt-2">
                    <button type="submit" class="btn btn-link text-secondary">Batalkan dan kembali ke login</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
