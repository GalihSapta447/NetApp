{% extends "base.html" %}
{% block title %}Registrasi Akun{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <h3 class="mb-1">Buat Akun Baru</h3>
                    <p class="text-muted mb-0">Masukkan Username, Email dan Password untuk registrasi.</p>
                </div>

                <form method="POST" autocomplete="off">
                    <div class="mb-3">
                        <label class="form-label" for="username">Username</label>
                        <input id="username" type="text" name="username" class="form-control"
                               minlength="3" maxlength="30" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="email">Email</label>
                        <input id="email" type="email" name="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="password">Password</label>
                        <input id="password" type="password" name="password" class="form-control"
                               minlength="8" required>
                        <div class="form-text">Minimal 8 karakter.</div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label" for="confirm_password">Konfirmasi Password</label>
                        <input id="confirm_password" type="password" name="confirm_password"
                               class="form-control" minlength="8" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Daftar Akun</button>
                </form>

                <p class="mt-3 text-center mb-0">
                    Sudah memiliki akun? <a href="{{ url_for('login') }}">Login di sini</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
